# Blackbox Exporter configuration for local Docker Compose demo.
#
# Defines probe modules used by Prometheus scrape jobs.
# Currently used to probe the Airflow health endpoint:
#   http://airflow:8080/health
#
# probe_success = 1  →  endpoint returned HTTP 2xx  (service is UP)
# probe_success = 0  →  endpoint timed out or returned non-2xx  (service is DOWN)

modules:
  http_2xx:
    prober: http
    timeout: 5s
    http:
      valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
      valid_status_codes: []   # empty = accept any 2xx
      method: GET
      follow_redirects: true
      preferred_ip_protocol: "ip4"
