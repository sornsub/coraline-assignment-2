# Prometheus scrape configuration for local Docker Compose demo.
#
# This file is used by the prometheus service in docker-compose.yaml.
# It is separate from monitoring/prometheus-rules.yaml, which is a
# Kubernetes PrometheusRule CRD and cannot be loaded by this Prometheus instance.
#
# Current scrape targets:
#   prometheus     — self-scrape via /metrics
#   atlas-portal   — native /metrics (prom-client)
#   orion-api      — native /metrics (prometheus-fastapi-instrumentator)
#   airflow-health — HTTP health probe via blackbox-exporter
#
# Alert rules are loaded from prometheus/alert-rules.yml.
# Alerts are forwarded to Alertmanager at http://alertmanager:9093.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert-rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:

  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # atlas-portal — instrumented with prom-client
  - job_name: "atlas-portal"
    metrics_path: /metrics
    static_configs:
      - targets: ["portal:8080"]

  # orion-api — instrumented with prometheus-fastapi-instrumentator
  - job_name: "orion-api"
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]

  # airflow — probed via blackbox-exporter HTTP check
  # Airflow does not expose a Prometheus /metrics endpoint by default.
  # blackbox-exporter probes http://airflow:8080/health and returns:
  #   probe_success = 1  if the endpoint returns HTTP 2xx
  #   probe_success = 0  if the endpoint times out or returns non-2xx
  #
  # Relabeling pattern:
  #   1. Uses the target URL as the ?target= query param sent to blackbox
  #   2. Preserves the URL as the instance label for readability
  #   3. Redirects the actual scrape address to blackbox-exporter:9115
  - job_name: "airflow-health"
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - http://airflow:8080/health
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
